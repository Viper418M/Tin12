<html>
<head>
  <meta charset="utf-8">
</head>
<body>
  <h1>Đóng góp ý kiến cho thư viện nhà trường</h1>

  <form action="NV3popup.html">
    <label>
      Họ và tên:
      <input type="email" name="txtEmail">
    </label><br><br>

    <label>
      Email:
      <input type="text" name="email">
    </label><br><br>

    <label for="comment">Đóng góp ý kiến:</label><br>
    <textarea id="comment" name="txtComment" rows="6" cols="40"></textarea>

    <p>Thể loại cần bổ sung thêm sách:</p>

    <input type="checkbox" name="chkTruyenNgan"> Truyện ngắn <br>
    <input type="checkbox" name="chkKiNang"> Kĩ năng sống <br>
    <input type="checkbox" name="chkCNTT"> Công nghệ thông tin <br>
    <input type="checkbox" name="chkTruyenTranh"> Truyện tranh <br>
    <input type="checkbox" name="chkLichSu"> Lịch sử <br><br>

    <button type="submit">Gửi</button>
  </form>

</body>
</html>
